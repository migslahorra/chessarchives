<mat-toolbar>
    <span><i class="fa-solid fa-chess-knight"></i> Chess Archives</span>
    <nav>
      <ul>
        <li *ngIf="userIsAuthenticated">  
            <a mat-button routerLink="/post-create" routerLinkActive="mat-accent"><i class="fa-solid fa-plus"></i> New Post</a>
        </li>

        <li *ngIf="userIsAuthenticated">
          <a mat-button routerLink="/post-list" routerLinkActive="mat-accent"><i class="fa-solid fa-list"></i> Manage Posts</a>
        </li>

        <li *ngIf="!userIsAuthenticated">  
          <a mat-button routerLink = "/home" routerLinkActive = "mat-accent"><i class="fa-solid fa-house"></i> Home</a>  
        </li> 

        <li *ngIf="!userIsAuthenticated">  
            <a mat-button routerLink = "/about" routerLinkActive = "mat-accent"><i class="fa-solid fa-circle-exclamation"></i> About</a>  
        </li> 

        <li *ngIf="!userIsAuthenticated">  
          <a mat-button routerLink = "/github" routerLinkActive = "mat-accent"><i class="fa-brands fa-github"></i> Github</a>  
        </li> 

        <li *ngIf="userIsAuthenticated">
          <button mat-button (click)= "onLogout()">Logout</button>
        </li>  
      </ul>
    </nav>
  </mat-toolbar>
